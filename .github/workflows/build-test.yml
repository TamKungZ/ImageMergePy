name: Build Test

on:
  push:
    tags-ignore:
      - "*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Pin Linux runner to Ubuntu 22.04 so produced Linux binaries
        # target glibc 2.35 (compatible with Ubuntu 22.04+ users).
        os: [windows-latest, ubuntu-22.04, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify syntax
        run: |
          python -m py_compile MainApp.py build_nuitka.py generate_embedded_locales.py

      - name: Build with Nuitka
        run: python build_nuitka.py
