name: Release Build

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with Nuitka
        run: python build_nuitka.py

      - name: Pack release archives
        shell: bash
        run: |
          python - <<'PY'
          import os
          import shutil
          from pathlib import Path

          root = Path('.')
          out = root / 'release_assets'
          out.mkdir(parents=True, exist_ok=True)
          runner = os.environ.get('RUNNER_OS', '')

          def zip_dir(name: str, source_dir: Path):
              if not source_dir.exists():
                  raise FileNotFoundError(f'Missing build output: {source_dir}')
              shutil.make_archive(str(out / name), 'zip', root_dir=source_dir.parent, base_dir=source_dir.name)

          if runner == 'Windows':
              zip_dir('ImageMerge-windows-x64', root / 'dist' / 'windows' / 'MainApp.dist')
          elif runner == 'Linux':
              zip_dir('ImageMerge-linux-x64', root / 'dist' / 'linux' / 'MainApp.dist')
          elif runner == 'macOS':
              zip_dir('ImageMerge-macos-binary', root / 'dist' / 'macos-binary' / 'MainApp.dist')
              zip_dir('ImageMerge-macos-app', root / 'dist' / 'macos-app' / 'ImageMerge.app')
          else:
              raise RuntimeError(f'Unsupported RUNNER_OS: {runner}')
          PY

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: release_assets/*.zip
          if-no-files-found: error

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release_files

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release_files/*.zip
