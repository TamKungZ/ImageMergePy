name: Release Build

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  MSIX_IDENTITY_NAME: "TamKungZ.ImageMergeGUI"
  MSIX_PUBLISHER: "CN=88710965-E667-4A2A-A501-921090393503"
  MSIX_PUBLISHER_DISPLAY_NAME: "TamKungZ_"

jobs:
  build:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Pin Linux runner to Ubuntu 22.04 so AppImage/.deb/.rpm are built
        # against glibc 2.35 instead of newer glibc from ubuntu-latest.
        os: [windows-latest, ubuntu-22.04, macos-15-intel, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with Nuitka
        run: python build_nuitka.py

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rpm flatpak flatpak-builder squashfs-tools appstream appstream-compose
          if ! command -v snapcraft >/dev/null 2>&1; then
            sudo snap install snapcraft --classic
          fi
          sudo gem install --no-document fpm
          curl -L -o appimagetool "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool

      - name: Build Linux installers (.deb/.rpm/.AppImage)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          python - <<'PY'
          import base64
          import os
          import shutil
          import stat
          import subprocess
          from pathlib import Path

          root = Path('.')
          out = root / 'release_assets'
          out.mkdir(parents=True, exist_ok=True)

          def first_existing(candidates):
              for candidate in candidates:
                  if candidate.exists():
                      return candidate
              return None

          dist_dir = first_existing([
              root / 'dist' / 'linux' / 'MainApp.dist',
              root / 'dist' / 'linux' / 'ImageMerge.dist',
          ])
          if dist_dir is None:
              raise FileNotFoundError('Missing Linux dist folder (MainApp.dist/ImageMerge.dist)')

          main_binary = dist_dir / 'ImageMerge'
          if not main_binary.exists():
              raise FileNotFoundError(f'Missing Linux main binary: {main_binary}')

          tag = os.environ.get('GITHUB_REF_NAME', '0.0.0')
          version = tag[1:] if tag.startswith('v') else tag
          if not version:
              version = '0.0.0'

          pkg_root = root / 'pkgroot'
          if pkg_root.exists():
              shutil.rmtree(pkg_root)
          (pkg_root / 'opt' / 'ImageMerge').mkdir(parents=True, exist_ok=True)
          shutil.copytree(dist_dir, pkg_root / 'opt' / 'ImageMerge', dirs_exist_ok=True)

          bin_dir = pkg_root / 'usr' / 'bin'
          bin_dir.mkdir(parents=True, exist_ok=True)
          launcher = bin_dir / 'imagemerge'
          launcher.write_text('#!/usr/bin/env bash\nexec /opt/ImageMerge/ImageMerge "$@"\n', encoding='utf-8')
          launcher.chmod(launcher.stat().st_mode | stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH)

          appdir = root / 'ImageMerge.AppDir'
          if appdir.exists():
              shutil.rmtree(appdir)
          (appdir / 'usr' / 'lib' / 'ImageMerge').mkdir(parents=True, exist_ok=True)
          shutil.copytree(dist_dir, appdir / 'usr' / 'lib' / 'ImageMerge', dirs_exist_ok=True)
          (appdir / 'usr' / 'share' / 'applications').mkdir(parents=True, exist_ok=True)

          app_lib_dir = appdir / 'usr' / 'lib' / 'ImageMerge'

          def resolve_system_library(soname: str) -> Path | None:
              try:
                  output = subprocess.check_output(['ldconfig', '-p'], text=True)
              except Exception:
                  return None
              for line in output.splitlines():
                  line = line.strip()
                  if not line or '=>' not in line:
                      continue
                  if line.startswith(f'{soname} '):
                      return Path(line.rsplit('=>', 1)[1].strip())
              return None

          appimage_runtime_libs = [
              'libxcb-cursor.so.0',
              'libxkbcommon-x11.so.0',
              'libxcb-icccm.so.4',
              'libxcb-keysyms.so.1',
              'libxcb-randr.so.0',
              'libxcb-shape.so.0',
              'libxcb-xfixes.so.0',
              'libxcb-xinerama.so.0',
              'libxcb-render-util.so.0',
              'libxcb-image.so.0',
              'libX11-xcb.so.1',
              'libxkbcommon.so.0',
          ]

          copied_runtime_libs = []
          for soname in appimage_runtime_libs:
              lib_path = resolve_system_library(soname)
              if lib_path is None or not lib_path.exists():
                  print(f'Warning: system library not found for AppImage bundling: {soname}')
                  continue
              target_path = app_lib_dir / lib_path.name
              shutil.copy2(lib_path, target_path)
              copied_runtime_libs.append(target_path.name)

          if copied_runtime_libs:
              print('Bundled AppImage runtime libraries:', ', '.join(sorted(copied_runtime_libs)))

          apprun = appdir / 'AppRun'
          apprun.write_text(
              '#!/usr/bin/env bash\n'
              'HERE="$(dirname "$(readlink -f "$0")")"\n'
              'export LD_LIBRARY_PATH="$HERE/usr/lib/ImageMerge:${LD_LIBRARY_PATH:-}"\n'
              'exec "$HERE/usr/lib/ImageMerge/ImageMerge" "$@"\n',
              encoding='utf-8',
          )
          apprun.chmod(apprun.stat().st_mode | stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH)

          desktop_file = appdir / 'ImageMerge.desktop'
          desktop_file.write_text(
              '[Desktop Entry]\n'
              'Type=Application\n'
              'Name=ImageMerge\n'
              'Exec=ImageMerge\n'
              'Icon=ImageMerge\n'
              'Categories=Utility;Graphics;\n',
              encoding='utf-8',
          )

          icon_source = root / 'assets' / 'imagemerge-icon-1024.png'
          if icon_source.exists():
              icon_png = icon_source.read_bytes()
          else:
              icon_png = base64.b64decode(
                  'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO7Z0XcAAAAASUVORK5CYII='
              )
          (appdir / 'ImageMerge.png').write_bytes(icon_png)
          (appdir / '.DirIcon').write_bytes(icon_png)

          print('Prepared Linux packaging trees')
          PY

          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ]; then VERSION="0.0.0"; fi

          ARCH_RAW="$(uname -m)"
          case "$ARCH_RAW" in
            x86_64|amd64)
              ARCH_LABEL="x64"
              DEB_ARCH="amd64"
              RPM_ARCH="x86_64"
              ;;
            aarch64|arm64)
              ARCH_LABEL="arm64"
              DEB_ARCH="arm64"
              RPM_ARCH="aarch64"
              ;;
            armv7l|armv6l|arm)
              ARCH_LABEL="arm"
              DEB_ARCH="armhf"
              RPM_ARCH="armhfp"
              ;;
            i386|i686|x86)
              ARCH_LABEL="x86"
              DEB_ARCH="i386"
              RPM_ARCH="i386"
              ;;
            *)
              ARCH_LABEL="x64"
              DEB_ARCH="amd64"
              RPM_ARCH="x86_64"
              ;;
          esac

          DEB_DEPENDS=(
            "libxcb-cursor0"
            "libxkbcommon-x11-0"
            "libxcb-icccm4"
            "libxcb-keysyms1"
            "libxcb-randr0"
            "libxcb-shape0"
            "libxcb-xfixes0"
            "libxcb-xinerama0"
            "libx11-xcb1"
            "libxcb-render-util0"
            "libxcb-image0"
            "libegl1"
            "libgl1"
          )
          DEB_DEP_ARGS=()
          for dep in "${DEB_DEPENDS[@]}"; do
            DEB_DEP_ARGS+=(--depends "$dep")
          done

          fpm -s dir -t deb -n imagemerge -v "$VERSION" --iteration 1 --architecture "$DEB_ARCH" --license MIT --maintainer "TamKungZ_" --description "Open-source image and video merge tool" --url "https://github.com/${GITHUB_REPOSITORY}" "${DEB_DEP_ARGS[@]}" -C pkgroot .
          mv imagemerge_*_"$DEB_ARCH".deb release_assets/ImageMerge-linux-"$ARCH_LABEL".deb

          RPM_DEPENDS=(
            "libxcb-cursor"
            "libxkbcommon-x11"
            "xcb-util-wm"
            "xcb-util-keysyms"
            "xcb-util-renderutil"
            "xcb-util-image"
            "libX11-xcb"
            "libEGL"
            "libGL"
          )
          RPM_DEP_ARGS=()
          for dep in "${RPM_DEPENDS[@]}"; do
            RPM_DEP_ARGS+=(--depends "$dep")
          done

          fpm -s dir -t rpm -n imagemerge -v "$VERSION" --iteration 1 --architecture "$RPM_ARCH" --license MIT --maintainer "TamKungZ_" --description "Open-source image and video merge tool" --url "https://github.com/${GITHUB_REPOSITORY}" "${RPM_DEP_ARGS[@]}" -C pkgroot .
          mv imagemerge-*.$RPM_ARCH.rpm release_assets/ImageMerge-linux-"$ARCH_LABEL".rpm

          APPIMAGE_ARCH="$ARCH_RAW"
          if [ "$ARCH_RAW" = "amd64" ]; then APPIMAGE_ARCH="x86_64"; fi
          if [ "$ARCH_RAW" = "arm64" ]; then APPIMAGE_ARCH="aarch64"; fi
          APPIMAGE_EXTRACT_AND_RUN=1 ARCH="$APPIMAGE_ARCH" ./appimagetool ImageMerge.AppDir release_assets/ImageMerge-linux-"$ARCH_LABEL".AppImage

      - name: Build Linux Flatpak bundle
        if: runner.os == 'Linux'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ]; then VERSION="0.0.0"; fi

          DIST_DIR=""
          for candidate in "dist/linux/MainApp.dist" "dist/linux/ImageMerge.dist"; do
            if [ -d "$candidate" ]; then DIST_DIR="$candidate"; break; fi
          done
          if [ -z "$DIST_DIR" ]; then
            echo "Missing Linux dist folder (MainApp.dist/ImageMerge.dist)"
            exit 1
          fi

          ARCH_RAW="$(uname -m)"
          case "$ARCH_RAW" in
            x86_64|amd64) ARCH_LABEL="x64" ;;
            aarch64|arm64) ARCH_LABEL="arm64" ;;
            armv7l|armv6l|arm) ARCH_LABEL="arm" ;;
            i386|i686|x86) ARCH_LABEL="x86" ;;
            *) ARCH_LABEL="x64" ;;
          esac

          rm -rf packaging/flatpak/flatpak-src flatpak-build-dir flatpak-repo
          mkdir -p packaging/flatpak/flatpak-src flatpak-repo release_assets
          cp -a "$DIST_DIR"/. packaging/flatpak/flatpak-src/

          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user --noninteractive -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08

          if ! command -v appstream-compose >/dev/null 2>&1; then
            if command -v appstreamcli >/dev/null 2>&1; then
              mkdir -p .ci-bin
              printf '%s\n' '#!/usr/bin/env bash' 'exec appstreamcli compose "$@"' > .ci-bin/appstream-compose
              chmod +x .ci-bin/appstream-compose
              export PATH="$PWD/.ci-bin:$PATH"
            fi
          fi

          flatpak-builder --force-clean --repo=flatpak-repo flatpak-build-dir packaging/flatpak/me.tamkungz.ImageMerge.yml
          flatpak build-bundle flatpak-repo "release_assets/ImageMerge-linux-${ARCH_LABEL}.flatpak" me.tamkungz.ImageMerge "$VERSION"

      - name: Build Linux Snap package
        if: runner.os == 'Linux'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ]; then VERSION="0.0.0"; fi

          DIST_DIR=""
          for candidate in "dist/linux/MainApp.dist" "dist/linux/ImageMerge.dist"; do
            if [ -d "$candidate" ]; then DIST_DIR="$candidate"; break; fi
          done
          if [ -z "$DIST_DIR" ]; then
            echo "Missing Linux dist folder (MainApp.dist/ImageMerge.dist)"
            exit 1
          fi

          ARCH_RAW="$(uname -m)"
          case "$ARCH_RAW" in
            x86_64|amd64) ARCH_LABEL="x64" ;;
            aarch64|arm64) ARCH_LABEL="arm64" ;;
            armv7l|armv6l|arm) ARCH_LABEL="arm" ;;
            i386|i686|x86) ARCH_LABEL="x86" ;;
            *) ARCH_LABEL="x64" ;;
          esac

          rm -rf snap-src
          mkdir -p snap-src release_assets
          cp -a "$DIST_DIR"/. snap-src/

          rm -f ./*.snap
          export SNAPCRAFT_PROJECT_VERSION="$VERSION"
          snapcraft --destructive-mode

          SNAP_FILE=""
          for f in ./*.snap; do
            if [ -f "$f" ]; then SNAP_FILE="$f"; break; fi
          done
          if [ -z "$SNAP_FILE" ]; then
            echo "Snap build did not produce a .snap file"
            exit 1
          fi

          mv "$SNAP_FILE" "release_assets/ImageMerge-linux-${ARCH_LABEL}.snap"

      - name: Install WiX Toolset
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install wixtoolset --no-progress -y

      - name: Build Windows installer (.msi)
        if: runner.os == 'Windows'
        shell: powershell
        env:
          MSIX_PFX_BASE64: ${{ secrets.MSIX_PFX_BASE64 }}
          MSIX_PFX_PASSWORD: ${{ secrets.MSIX_PFX_PASSWORD }}
        run: |
          $distCandidates = @(
            "dist/windows/MainApp.dist",
            "dist/windows/ImageMerge.dist"
          )
          $distDir = $null
          foreach ($candidate in $distCandidates) {
            if (Test-Path $candidate) { $distDir = $candidate; break }
          }
          if (-not $distDir) { throw "Missing Windows dist folder (MainApp.dist/ImageMerge.dist)" }

          if (-not (Test-Path "app_metadata.json")) { throw "Missing app_metadata.json" }
          $meta = Get-Content "app_metadata.json" -Raw | ConvertFrom-Json
          $productVersionRaw = [string]$meta.product_version
          if ([string]::IsNullOrWhiteSpace($productVersionRaw)) { $productVersionRaw = "1.0.1.0" }

          $versionParts = $productVersionRaw.Split('.')
          while ($versionParts.Count -lt 3) { $versionParts += "0" }
          $msiVersion = "$($versionParts[0]).$($versionParts[1]).$($versionParts[2])"

          $iconPath = (Resolve-Path "assets/icon.ico").Path

          $archRaw = ($env:PROCESSOR_ARCHITECTURE + "").ToLowerInvariant()
          $archLabel = switch ($archRaw) {
            "amd64" { "x64" }
            "x86" { "x86" }
            "arm64" { "arm64" }
            "arm" { "arm" }
            default { "x64" }
          }
          $programFilesDirId = if ($archLabel -eq "x86") { "ProgramFilesFolder" } else { "ProgramFiles64Folder" }

          New-Item -ItemType Directory -Force -Path installer | Out-Null
          New-Item -ItemType Directory -Force -Path release_assets | Out-Null

          heat dir "$distDir" -cg ImageMergeFiles -dr INSTALLFOLDER -scom -sreg -srd -gg -var var.SourceDir -out installer\ImageMergeFiles.wxs

          function Write-WixDefinition {
            param(
              [string]$WxsPath,
              [string]$ProductName,
              [string]$UpgradeCode,
              [string]$RegistryName
            )

            $wxs = @(
              '<?xml version="1.0" encoding="UTF-8"?>',
              '<Wix xmlns="http://schemas.microsoft.com/wix/2006/wi">',
              ('  <Product Id="*" Name="{0}" Language="1033" Version="{1}" Manufacturer="TamKungZ_" UpgradeCode="{2}">' -f $ProductName, $msiVersion, $UpgradeCode),
              '    <Package InstallerVersion="500" Compressed="yes" InstallScope="perMachine" />',
              '    <MajorUpgrade DowngradeErrorMessage="A newer version of [ProductName] is already installed." />',
              '    <MediaTemplate EmbedCab="yes" />',
              '    <Property Id="ARPCONTACT" Value="TamKungZ_" />',
              '    <Property Id="ARPURLINFOABOUT" Value="https://github.com" />',
              '    <Property Id="ARPHELPLINK" Value="https://github.com" />',
              ('    <Icon Id="AppIcon.ico" SourceFile="{0}" />' -f $iconPath),
              '    <Property Id="ARPPRODUCTICON" Value="AppIcon.ico" />',
              '    <Property Id="WIXUI_INSTALLDIR" Value="INSTALLFOLDER" />',
              '    <UIRef Id="WixUI_InstallDir" />',
              ('    <Feature Id="MainFeature" Title="{0}" Level="1">' -f $ProductName),
              '      <ComponentGroupRef Id="ImageMergeFiles" />',
              '      <ComponentGroupRef Id="ImageMergeShortcuts" />',
              '    </Feature>',
              '  </Product>',
              '',
              '  <Fragment>',
              '    <Directory Id="TARGETDIR" Name="SourceDir">',
              ('      <Directory Id="{0}">' -f $programFilesDirId),
              ('        <Directory Id="INSTALLFOLDER" Name="{0}" />' -f $ProductName),
              '      </Directory>',
              '      <Directory Id="ProgramMenuFolder">',
              ('        <Directory Id="ImageMergeProgramMenuFolder" Name="{0}" />' -f $ProductName),
              '      </Directory>',
              '      <Directory Id="DesktopFolder" />',
              '    </Directory>',
              '  </Fragment>',
              '',
              '  <Fragment>',
              '    <ComponentGroup Id="ImageMergeShortcuts">',
              '      <Component Id="StartMenuShortcutComponent" Directory="ImageMergeProgramMenuFolder" Guid="*">',
              ('        <Shortcut Id="StartMenuShortcut" Name="{0}" Description="{0}" Target="[INSTALLFOLDER]ImageMerge.exe" WorkingDirectory="INSTALLFOLDER" />' -f $ProductName),
              '        <RemoveFolder Id="RemoveImageMergeProgramMenuFolder" On="uninstall" />',
              ('        <RegistryValue Root="HKCU" Key="Software\TamKungZ_\{0}" Name="StartMenuShortcut" Type="integer" Value="1" KeyPath="yes" />' -f $RegistryName),
              '      </Component>',
              '      <Component Id="DesktopShortcutComponent" Directory="DesktopFolder" Guid="*">',
              ('        <Shortcut Id="DesktopShortcut" Name="{0}" Description="{0}" Target="[INSTALLFOLDER]ImageMerge.exe" WorkingDirectory="INSTALLFOLDER" />' -f $ProductName),
              ('        <RegistryValue Root="HKCU" Key="Software\TamKungZ_\{0}" Name="DesktopShortcut" Type="integer" Value="1" KeyPath="yes" />' -f $RegistryName),
              '      </Component>',
              '    </ComponentGroup>',
              '  </Fragment>',
              '',
              '</Wix>'
            ) -join "`n"

            Set-Content -Path $WxsPath -Value $wxs -Encoding UTF8
          }

          $standardWxsPath = "installer\ImageMerge.wxs"
          $msStoreWxsPath = "installer\ImageMergeGUI.wxs"

          Write-WixDefinition -WxsPath $standardWxsPath -ProductName "ImageMerge" -UpgradeCode "C5A07E9D-9634-44F0-8D8E-050A2F31A8E9" -RegistryName "ImageMerge"
          Write-WixDefinition -WxsPath $msStoreWxsPath -ProductName "ImageMergeGUI" -UpgradeCode "A7E84311-245A-4287-B710-95A783D047A8" -RegistryName "ImageMergeGUI"

          $wixArch = if ($archLabel -eq "x86") { "x86" } else { "x64" }

          candle -dSourceDir="$distDir" installer\ImageMergeFiles.wxs -arch $wixArch
          candle -dSourceDir="$distDir" $standardWxsPath -arch $wixArch
          light -spdb -ext WixUIExtension ImageMerge.wixobj ImageMergeFiles.wixobj -o release_assets\ImageMerge-windows-$archLabel.msi

          candle -dSourceDir="$distDir" $msStoreWxsPath -arch $wixArch
          light -spdb -ext WixUIExtension ImageMergeGUI.wixobj ImageMergeFiles.wixobj -o release_assets\ImageMergeGUI-windows-$archLabel-msstore.msi

          $iconSource = "assets/imagemerge-icon-1024.png"
          if (-not (Test-Path $iconSource)) { throw "Missing icon source for MSIX: $iconSource" }

          $msixRoot = "msix_root"
          if (Test-Path $msixRoot) { Remove-Item $msixRoot -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $msixRoot | Out-Null

          Copy-Item -Path (Join-Path $distDir "*") -Destination $msixRoot -Recurse -Force

          $assetsDir = Join-Path $msixRoot "Assets"
          New-Item -ItemType Directory -Force -Path $assetsDir | Out-Null

          Add-Type -AssemblyName System.Drawing
          function Write-ResizedPng {
            param(
              [string]$InputPath,
              [string]$OutputPath,
              [int]$Width,
              [int]$Height
            )

            $img = [System.Drawing.Image]::FromFile($InputPath)
            $bmp = New-Object System.Drawing.Bitmap($Width, $Height)
            $g = [System.Drawing.Graphics]::FromImage($bmp)
            $g.InterpolationMode = [System.Drawing.Drawing2D.InterpolationMode]::HighQualityBicubic
            $g.SmoothingMode = [System.Drawing.Drawing2D.SmoothingMode]::HighQuality
            $g.PixelOffsetMode = [System.Drawing.Drawing2D.PixelOffsetMode]::HighQuality
            $g.CompositingQuality = [System.Drawing.Drawing2D.CompositingQuality]::HighQuality
            $g.Clear([System.Drawing.Color]::Transparent)
            $g.DrawImage($img, 0, 0, $Width, $Height)
            $bmp.Save($OutputPath, [System.Drawing.Imaging.ImageFormat]::Png)
            $g.Dispose(); $bmp.Dispose(); $img.Dispose()
          }

          Write-ResizedPng -InputPath $iconSource -OutputPath (Join-Path $assetsDir "Square44x44Logo.png") -Width 44 -Height 44
          Write-ResizedPng -InputPath $iconSource -OutputPath (Join-Path $assetsDir "Square150x150Logo.png") -Width 150 -Height 150
          Write-ResizedPng -InputPath $iconSource -OutputPath (Join-Path $assetsDir "StoreLogo.png") -Width 50 -Height 50

          $versionParts4 = $productVersionRaw.Split('.')
          while ($versionParts4.Count -lt 4) { $versionParts4 += "0" }
          $msixVersion = "$($versionParts4[0]).$($versionParts4[1]).$($versionParts4[2]).$($versionParts4[3])"

          $msixArch = switch ($archLabel) {
            "x86" { "x86" }
            "arm64" { "arm64" }
            default { "x64" }
          }

          $manifest = @(
            '<?xml version="1.0" encoding="utf-8"?>',
            '<Package xmlns="http://schemas.microsoft.com/appx/manifest/foundation/windows10" xmlns:uap="http://schemas.microsoft.com/appx/manifest/uap/windows10" xmlns:desktop="http://schemas.microsoft.com/appx/manifest/desktop/windows10" xmlns:rescap="http://schemas.microsoft.com/appx/manifest/foundation/windows10/restrictedcapabilities" IgnorableNamespaces="uap desktop rescap">',
            ('  <Identity Name="{0}" Publisher="{1}" Version="{2}" ProcessorArchitecture="{3}" />' -f $env:MSIX_IDENTITY_NAME, $env:MSIX_PUBLISHER, $msixVersion, $msixArch),
            ('  <Properties><DisplayName>ImageMergeGUI</DisplayName><PublisherDisplayName>{0}</PublisherDisplayName><Description>Open-source image and video merge tool</Description><Logo>Assets/StoreLogo.png</Logo></Properties>' -f $env:MSIX_PUBLISHER_DISPLAY_NAME),
            '  <Dependencies><TargetDeviceFamily Name="Windows.Desktop" MinVersion="10.0.17763.0" MaxVersionTested="10.0.26100.0" /></Dependencies>',
            '  <Resources><Resource Language="en-us" /></Resources>',
            '  <Applications>',
            '    <Application Id="App" Executable="ImageMerge.exe" EntryPoint="Windows.FullTrustApplication">',
            '      <uap:VisualElements DisplayName="ImageMergeGUI" Description="Open-source image and video merge tool" BackgroundColor="transparent" Square44x44Logo="Assets/Square44x44Logo.png" Square150x150Logo="Assets/Square150x150Logo.png">',
            '        <uap:DefaultTile Wide310x150Logo="Assets/Square150x150Logo.png" Square310x310Logo="Assets/Square150x150Logo.png" />',
            '      </uap:VisualElements>',
            '      <Extensions><desktop:Extension Category="windows.fullTrustProcess" Executable="ImageMerge.exe" /></Extensions>',
            '    </Application>',
            '  </Applications>',
            '  <Capabilities><rescap:Capability Name="runFullTrust" /></Capabilities>',
            '</Package>'
          ) -join "`n"

          Set-Content -Path (Join-Path $msixRoot "AppxManifest.xml") -Value $manifest -Encoding UTF8

          $makeappx = (Get-Command makeappx.exe -ErrorAction SilentlyContinue).Source
          if (-not $makeappx) {
            $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Filter makeappx.exe -Recurse -ErrorAction SilentlyContinue |
              Sort-Object FullName -Descending |
              Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $makeappx) { throw "makeappx.exe not found" }

          $signtool = (Get-Command signtool.exe -ErrorAction SilentlyContinue).Source
          if (-not $signtool) {
            $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Filter signtool.exe -Recurse -ErrorAction SilentlyContinue |
              Sort-Object FullName -Descending |
              Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $signtool) { throw "signtool.exe not found" }

          $msixOutput = "release_assets\ImageMergeGUI-windows-$archLabel.msix"
          & $makeappx pack /d $msixRoot /p $msixOutput /o
          if ($LASTEXITCODE -ne 0) { throw "makeappx failed" }

          if ([string]::IsNullOrWhiteSpace($env:MSIX_PFX_BASE64) -or [string]::IsNullOrWhiteSpace($env:MSIX_PFX_PASSWORD)) {
            throw "Missing MSIX signing secrets: MSIX_PFX_BASE64 / MSIX_PFX_PASSWORD"
          }

          $pfxPath = "msix-signing.pfx"
          [System.IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:MSIX_PFX_BASE64))

          & $signtool sign /fd SHA256 /f $pfxPath /p $env:MSIX_PFX_PASSWORD /tr http://timestamp.digicert.com /td SHA256 $msixOutput
          if ($LASTEXITCODE -ne 0) { throw "signtool failed for MSIX" }

          Remove-Item $pfxPath -Force

          if (Test-Path "cab1.cab") { Remove-Item "cab1.cab" -Force }
          Get-ChildItem -Path . -Filter "*.wixpdb" -ErrorAction SilentlyContinue | Remove-Item -Force

      - name: Pack release archives
        shell: bash
        run: |
          python - <<'PY'
          import os
          import shutil
          from pathlib import Path

          root = Path('.')
          out = root / 'release_assets'
          out.mkdir(parents=True, exist_ok=True)
          runner = os.environ.get('RUNNER_OS', '')

          def normalize_arch(value: str) -> str:
              arch = (value or '').strip().lower()
              aliases = {
                  'amd64': 'x64',
                  'x86_64': 'x64',
                  'x64': 'x64',
                  'i386': 'x86',
                  'i686': 'x86',
                  'x86': 'x86',
                  'aarch64': 'arm64',
                  'arm64': 'arm64',
                  'armv7l': 'arm',
                  'armv6l': 'arm',
                  'arm': 'arm',
              }
              return aliases.get(arch, 'x64')

          def zip_dir(name: str, source_dir: Path, top_level: str = 'ImageMerge'):
              if not source_dir.exists():
                  raise FileNotFoundError(f'Missing build output: {source_dir}')
              staging_root = root / 'zip_staging' / name
              if staging_root.exists():
                  shutil.rmtree(staging_root)
              payload_root = staging_root / top_level
              payload_root.parent.mkdir(parents=True, exist_ok=True)
              if source_dir.is_dir():
                  shutil.copytree(source_dir, payload_root, dirs_exist_ok=True)
              else:
                  raise FileNotFoundError(f'Unsupported build output type: {source_dir}')
              shutil.make_archive(str(out / name), 'zip', root_dir=staging_root, base_dir=top_level)
              shutil.rmtree(staging_root, ignore_errors=True)

          def first_existing(candidates):
              for candidate in candidates:
                  if candidate.exists():
                      return candidate
              return None

          if runner == 'Windows':
              arch = normalize_arch(os.environ.get('PROCESSOR_ARCHITECTURE', ''))
              dist_dir = first_existing([
                  root / 'dist' / 'windows' / 'MainApp.dist',
                  root / 'dist' / 'windows' / 'ImageMerge.dist',
              ])
              if dist_dir is None:
                  raise FileNotFoundError('Missing Windows dist folder (MainApp.dist/ImageMerge.dist)')
              zip_dir(f'ImageMerge-windows-{arch}', dist_dir, 'ImageMerge')
          elif runner == 'Linux':
              import platform
              arch = normalize_arch(platform.machine())
              dist_dir = first_existing([
                  root / 'dist' / 'linux' / 'MainApp.dist',
                  root / 'dist' / 'linux' / 'ImageMerge.dist',
              ])
              if dist_dir is None:
                  raise FileNotFoundError('Missing Linux dist folder (MainApp.dist/ImageMerge.dist)')
              zip_dir(f'ImageMerge-linux-{arch}', dist_dir, 'ImageMerge')
          elif runner == 'macOS':
              import platform
              arch = normalize_arch(platform.machine())
              dist_dir = first_existing([
                  root / 'dist' / 'macos-binary' / 'MainApp.dist',
                  root / 'dist' / 'macos-binary' / 'ImageMerge.dist',
              ])
              if dist_dir is None:
                  raise FileNotFoundError('Missing macOS binary dist folder (MainApp.dist/ImageMerge.dist)')
              zip_dir(f'ImageMerge-macos-binary-{arch}', dist_dir, 'ImageMerge')

              app_candidates = sorted((root / 'dist' / 'macos-app').glob('*.app'))
              if not app_candidates:
                  raise FileNotFoundError('Missing macOS app bundle (*.app) in dist/macos-app')
              zip_dir(f'ImageMerge-macos-app-{arch}', app_candidates[0], 'ImageMerge')
          else:
              raise RuntimeError(f'Unsupported RUNNER_OS: {runner}')
          PY

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-${{ matrix.os }}
          path: release_assets/*
          if-no-files-found: error

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: release-*
          merge-multiple: true
          path: release_files

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release_files/*
