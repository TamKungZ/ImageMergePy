app-id: me.tamkungz.ImageMerge
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
command: ImageMerge
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --filesystem=home

# Flathub-specific manifest (separate from CI bundle manifest).
#
# Note:
# - This manifest is intended as the starting point for Flathub PR work.
# - Python dependencies are pinned in packaging/flathub/python3-modules.json.

modules:
  - python3-modules.json
  - name: imagemerge
    buildsystem: simple
    build-commands:
      - install -d /app/bin /app/lib/ImageMerge /app/share/applications /app/share/metainfo /app/share/icons/hicolor/scalable/apps
      - cp -a . /app/lib/ImageMerge/
      - |
        cat > /app/bin/ImageMerge << 'EOF'
        #!/usr/bin/env sh
        exec /usr/bin/python3 /app/lib/ImageMerge/MainApp.py "$@"
        EOF
      - chmod 0755 /app/bin/ImageMerge
      - install -Dm644 packaging/flatpak/me.tamkungz.ImageMerge.desktop /app/share/applications/me.tamkungz.ImageMerge.desktop
      - install -Dm644 packaging/flatpak/me.tamkungz.ImageMerge.metainfo.xml /app/share/metainfo/me.tamkungz.ImageMerge.metainfo.xml
      - install -Dm644 packaging/flatpak/me.tamkungz.ImageMerge.svg /app/share/icons/hicolor/scalable/apps/me.tamkungz.ImageMerge.svg
    sources:
      - type: archive
        url: https://github.com/TamKungZ/ImageMergePy/archive/refs/tags/v1.0.2.tar.gz
        sha256: 5ff85b77039931787e7082a1f1ab35d109de616d64eb471f692a39dd2c1e0d23
